name: .NET Framework Tests and Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: windows-latest  # ← ИЗМЕНИЛИ на windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET Framework
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
    
    - name: Restore NuGet packages
      run: nuget restore TODOMVVM.sln
    
    - name: Build solution
      run: msbuild TODOMVVM.sln /p:Configuration=Release
    
    - name: Run tests
      run: |
        cd "Паттерн MVVM.Tests"
        dotnet run Program.cs
